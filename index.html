<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#0b1220;color:#e2e8f0;display:flex;}
#sidebar {width:260px;background:#020617;height:100vh;padding:15px;}
.aulaBtn {width:100%;margin-bottom:10px;padding:12px;background:#1e293b;border:none;color:#cbd5f5;border-radius:8px;cursor:pointer;}
.locked {opacity:0.3;}
#main {flex:1;padding:25px;}
header {background:#1e293b;padding:15px;border-radius:10px;margin-bottom:20px;}
.card {background:#1e293b;padding:25px;border-radius:12px;line-height:1.8;}
h2{color:#38bdf8;} h3{color:#7dd3fc;}
pre{background:#020617;padding:15px;border-radius:10px;color:#38bdf8;}
textarea{width:100%;height:120px;background:#020617;color:white;border:1px solid #334155;border-radius:8px;padding:10px;}
button{margin-top:10px;padding:10px;background:#38bdf8;border:none;border-radius:8px;}
progress{width:100%;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
<header>
<h2>DevStudy Pro</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<div id="conteudo"></div>
</div>

<script>

let xp=+localStorage.getItem("xp")||0;
let level=+localStorage.getItem("level")||1;
let xpMax=+localStorage.getItem("xpMax")||120;
let aulasFeitas=JSON.parse(localStorage.getItem("aulas"))||[];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function updateUI(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
document.getElementById("xpMax").innerText=xpMax;
bar.max=xpMax;
bar.value=xp;
}

function addXP(v){
xp+=v;
if(xp>=xpMax){
xp=0;level++;xpMax+=120;
alert("🎉 Subiu de nível!");
}
if(xp<0)xp=0;
salvar();updateUI();
}

const aulas=["Variáveis","Tipos","Input","Operadores","Condicionais","For"];

function renderSidebar(){
let html="";
aulas.forEach((a,i)=>{
let ok=i===0||aulasFeitas.includes(i-1);
html+=`<button class="aulaBtn ${!ok?"locked":""}" ${!ok?"disabled":""} onclick="abrir(${i})">${i+1}. ${a}</button>`;
});
sidebar.innerHTML=html;
}

function abrir(i){
conteudo.innerHTML=conteudos[i];
let btn=document.getElementById("btnConcluir");

if(aulasFeitas.includes(i)){
btn.disabled=true;btn.innerText="✔ Concluída";
}else{
btn.innerText="Concluir aula (+5 XP)";
btn.onclick=()=>{concluir(i);btn.disabled=true;btn.innerText="✔ Concluída";}
}
}

function concluir(i){
if(aulasFeitas.includes(i))return;
aulasFeitas.push(i);
addXP(5);
salvar();
renderSidebar();
}

function corrigir(id,res){
let txt=document.getElementById(id).value.toLowerCase();
let r=document.getElementById(res);

if(txt.includes("int") && txt.includes("str")){
r.innerHTML="✔ Excelente! Você entendeu os tipos.";
addXP(10);
}else{
r.innerHTML="❌ Resposta incompleta.<br><b>Exemplo:</b><pre>x = 10\nnome = \"Ana\"</pre>";
addXP(-3);
}
}

const conteudos=[

/* AULA 1 (mantida) */
`<div class="card">
<h2>📦 Variáveis (Aula Completa Nível Livro)</h2>

<h3>📖 O que são variáveis?</h3>
<p>Variáveis são estruturas fundamentais na programação. Elas permitem armazenar informações na memória do computador para uso posterior.</p>

<p>Pense em uma variável como uma caixa com um nome. Dentro dessa caixa você pode guardar um valor.</p>

<pre>nome = "Carlos"</pre>

<h3>🧠 Como funciona na prática?</h3>
<p>O Python cria um espaço na memória e associa o nome ao valor.</p>

<h3>💡 Exemplo básico</h3>
<pre>
idade = 25
print(idade)
</pre>

<h3>💡 Exemplo real</h3>
<pre>
preco = 100
desconto = 20
total = preco - desconto
print(total)
</pre>

<h3>⚠️ Erros comuns</h3>
<pre>nome = Carlos</pre>
<pre>x = "10" + 5</pre>

<h3>🧠 Exercício</h3>
<p>Crie um sistema com preco, desconto e total</p>

<textarea id="a1"></textarea>
<button onclick="corrigir('a1','r1')">Verificar</button>
<p id="r1"></p>

<h3>📚 Resumo</h3>
<p>Variáveis armazenam dados e são essenciais.</p>

<button id="btnConcluir"></button>
</div>`

/* ================= AULA 2 GIGANTE ================= */
`<div class="card">
<h2>🔢 Tipos de Dados (Nível Livro)</h2>

<h3>📖 Introdução</h3>
<p>Em programação, todo valor possui um tipo. O tipo define como aquele dado será tratado pelo sistema.</p>

<p>Sem entender tipos de dados, você não consegue construir programas confiáveis.</p>

---

<h3>🧠 Principais tipos em Python</h3>

<ul>
<li><b>int</b> → números inteiros</li>
<li><b>float</b> → números decimais</li>
<li><b>str</b> → textos</li>
<li><b>bool</b> → verdadeiro ou falso</li>
</ul>

---

<h3>💡 Exemplos práticos</h3>

<pre>
idade = 25          # int
preco = 19.90       # float
nome = "Carlos"     # str
ativo = True        # bool
</pre>

---

<h3>🧠 Como o Python interpreta isso?</h3>

<p>O Python identifica automaticamente o tipo do valor atribuído.</p>

<pre>
x = 10
print(type(x))
</pre>

---

<h3>💡 Exemplo do mundo real</h3>

<pre>
nome = "João"
idade = 18
saldo = 250.75
vip = True
</pre>

<p>Isso simula dados de um usuário.</p>

---

<h3>⚠️ Erros comuns</h3>

<p><b>Erro 1:</b></p>
<pre>"10" + 5</pre>
<p>Você não pode somar texto com número.</p>

<p><b>Erro 2:</b></p>
<pre>idade = "18"</pre>
<p>Aqui idade virou texto, não número.</p>

---

<h3>🧠 Conversão de tipos</h3>

<p>Você pode converter valores:</p>

<pre>
x = int("10")
y = str(20)
z = float("5.5")
</pre>

---

<h3>🧠 Exercício</h3>
<p>Crie:</p>
<ul>
<li>um número inteiro</li>
<li>um texto</li>
<li>um número decimal</li>
</ul>

<textarea id="a2"></textarea>
<button onclick="corrigir('a2','r2')">Verificar resposta</button>
<p id="r2"></p>

---

<h3>📚 Resumo</h3>
<p>Tipos de dados definem como os valores são tratados no programa.</p>

<button id="btnConcluir"></button>
</div>`,

/* OUTRAS */
`<div class="card"><h2>Input</h2><button id="btnConcluir"></button></div>`,
`<div class="card"><h2>Operadores</h2><button id="btnConcluir"></button></div>`,
`<div class="card"><h2>Condicionais</h2><button id="btnConcluir"></button></div>`,
`<div class="card"><h2>For</h2><button id="btnConcluir"></button></div>`

];

renderSidebar();
updateUI();

</script>

</body>
</html>
