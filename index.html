<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso de Programação App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* TELAS */
section {
    display: none;
    padding: 20px;
    min-height: calc(100vh - 60px);
    opacity: 0;
    transform: translateY(10px);
    transition: 0.3s;
}

section.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* HEADER APP */
header {
    text-align: center;
    padding: 15px;
    background: #1e293b;
    position: sticky;
    top: 0;
}

/* BOTÕES */
button.action {
    margin-top: 10px;
    padding: 10px;
    background: #38bdf8;
    border: none;
    color: black;
    border-radius: 8px;
}

/* MENU INFERIOR (APP) */
nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    background: #020617;
    border-top: 1px solid #334155;
}

nav button {
    flex: 1;
    padding: 12px;
    border: none;
    background: none;
    color: white;
    font-size: 14px;
}

nav button:hover {
    background: #1e293b;
}

/* CODE BOX */
code {
    display: block;
    background: black;
    padding: 10px;
    border-radius: 8px;
    color: #38bdf8;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
<h2>📱 Curso App</h2>
</header>

<!-- TELAS -->
<section id="inicio" class="active">
<h2>🏠 Início</h2>
<p>Bem-vindo ao seu app de estudos 🚀</p>
</section>

<section id="variaveis">
<h2>📦 Variáveis</h2>
<p>Guardam valores na memória.</p>

<code>
nome = "João"
idade = 20
</code>

<button class="action" onclick="alert('Variáveis guardam dados!')">
Testar
</button>
</section>

<section id="listas">
<h2>📋 Listas</h2>
<p>Guardam vários valores juntos.</p>

<code>
compras = ["arroz", "feijão", "leite"]
</code>

<button class="action" onclick="alert('Lista = vários valores!')">
Entendi
</button>
</section>

<section id="desafios">
<h2>🧠 Desafio</h2>
<p>Crie uma lista com 3 nomes.</p>

<button class="action" onclick="alert('Exemplo: nomes = [Ana, João, Carlos]')">
Ver resposta
</button>
</section>

<!-- MENU INFERIOR -->
<nav>
<button onclick="show('inicio')">🏠</button>
<button onclick="show('variaveis')">📦</button>
<button onclick="show('listas')">📋</button>
<button onclick="show('desafios')">🧠</button>
</nav>

<script>
function show(id) {
    document.querySelectorAll("section")
    .forEach(sec => sec.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
