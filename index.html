<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro</title>

<style>
body {
margin:0;
font-family:'Segoe UI';
background:#0b1220;
color:#e2e8f0;
display:flex;
}

/* SIDEBAR */
#sidebar {
width:270px;
background:#020617;
height:100vh;
overflow:auto;
padding:15px;
}

.aulaBtn {
width:100%;
margin-bottom:10px;
padding:12px;
background:#1e293b;
border:none;
color:#cbd5f5;
border-radius:8px;
cursor:pointer;
text-align:left;
}

.locked {
opacity:0.3;
}

/* MAIN */
#main {
flex:1;
padding:25px;
overflow:auto;
height:100vh;
}

header {
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.card {
background:#1e293b;
padding:25px;
border-radius:12px;
line-height:1.9;
}

h2{color:#38bdf8;}
h3{color:#7dd3fc;}

pre {
background:#020617;
padding:15px;
border-radius:10px;
color:#38bdf8;
overflow:auto;
}

textarea {
width:100%;
height:120px;
background:#020617;
color:white;
border:1px solid #334155;
border-radius:8px;
padding:10px;
}

button {
margin-top:10px;
padding:10px;
background:#38bdf8;
border:none;
border-radius:8px;
}

progress {width:100%;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
<header>
<h2>DevStudy Pro</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<div id="conteudo"></div>
</div>

<script>

let xp=+localStorage.getItem("xp")||0;
let level=+localStorage.getItem("level")||1;
let xpMax=+localStorage.getItem("xpMax")||120;
let aulasFeitas=JSON.parse(localStorage.getItem("aulas"))||[];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function updateUI(){
xpEl.innerText=xp;
levelEl.innerText=level;
xpMaxEl.innerText=xpMax;
bar.max=xpMax;
bar.value=xp;
}

function addXP(v){
xp+=v;
if(xp>=xpMax){
xp=0;
level++;
xpMax+=120;
alert("🎉 Subiu de nível!");
}
if(xp<0)xp=0;
salvar();
updateUI();
}

const aulas=[
"Variáveis","Tipos","Input","Operadores","Condicionais",
"Loops","While","Listas","Tuplas","Dicionários",
"Funções","Funções Avançadas","Strings","Erros","Projeto Final"
];

function renderSidebar(){
let html="";
aulas.forEach((a,i)=>{
let ok=i===0||aulasFeitas.includes(i-1);
html+=`<button class="aulaBtn ${!ok?"locked":""}" ${!ok?"disabled":""} onclick="abrir(${i})">${i+1}. ${a}</button>`;
});
sidebar.innerHTML=html;
}

function abrir(i){
conteudo.innerHTML=conteudos[i];

let btn=document.getElementById("btnConcluir");

if(btn){
if(aulasFeitas.includes(i)){
btn.disabled=true;
btn.innerText="✔ Concluída";
}else{
btn.innerText="Concluir aula (+5 XP)";
btn.onclick=()=>{
aulasFeitas.push(i);
addXP(5);
salvar();
renderSidebar();
btn.disabled=true;
btn.innerText="✔ Concluída";
}
}
}
}

function corrigir(id,res){
let txt=document.getElementById(id).value.toLowerCase();
let r=document.getElementById(res);

if(txt.length>5){
r.innerHTML="✔ Boa resposta!";
addXP(10);
}else{
r.innerHTML="❌ Resposta fraca.<br><b>Exemplo:</b><pre>x = 10</pre>";
addXP(-3);
}
}

/* ================= AULAS 1–5 ================= */
const conteudos=[

`<div class="card">
<h2>📦 Variáveis</h2>
<p>Variáveis armazenam dados na memória e são essenciais para qualquer sistema.</p>

<h3>Exemplo</h3>
<pre>
preco = 100
desconto = 20
total = preco - desconto
</pre>

<textarea id="a1"></textarea>
<button onclick="corrigir('a1','r1')">Verificar</button>
<p id="r1"></p>

<button id="btnConcluir"></button>
</div>`,

`<div class="card">
<h2>🔢 Tipos de Dados</h2>
<p>Definem como os valores são interpretados.</p>

<pre>
x = 10
nome = "Ana"
</pre>

<textarea id="a2"></textarea>
<button onclick="corrigir('a2','r2')">Verificar</button>
<p id="r2"></p>

<button id="btnConcluir"></button>
</div>`,

`<div class="card">
<h2>⌨️ Input</h2>
<p>Permite entrada de dados.</p>

<pre>
nome = input("Digite:")
</pre>

<textarea id="a3"></textarea>
<button onclick="corrigir('a3','r3')">Verificar</button>
<p id="r3"></p>

<button id="btnConcluir"></button>
</div>`,

`<div class="card">
<h2>🧮 Operadores</h2>
<pre>
10 + 5
10 > 5
</pre>

<textarea id="a4"></textarea>
<button onclick="corrigir('a4','r4')">Verificar</button>
<p id="r4"></p>

<button id="btnConcluir"></button>
</div>`,

`<div class="card">
<h2>🧠 Condicionais</h2>
<pre>
if x > 5:
 print("ok")
</pre>

<textarea id="a5"></textarea>
<button onclick="corrigir('a5','r5')">Verificar</button>
<p id="r5"></p>

<button id="btnConcluir"></button>
</div>`

];

renderSidebar();
updateUI();

</script>

</body>
</html>
