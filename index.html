<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {text-align:center;padding:15px;background:#1e293b;}
section {display:none;padding:20px;}
section.active {display:block;}

.card {
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:15px;
line-height:1.6;
}

.locked {opacity:0.4;}

button {
padding:10px;
margin-top:15px;
border:none;
border-radius:8px;
background:#38bdf8;
cursor:pointer;
}

progress {width:100%;}

nav {
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#020617;
}

nav button {flex:1;background:none;color:white;}

pre {
background:#020617;
padding:10px;
border-radius:8px;
overflow:auto;
}

h3 {margin-top:25px;}
</style>
</head>

<body>

<header>
<h2>📚 DevStudy Pro</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<section id="aulas" class="active"></section>

<section id="aulaView">
<div class="card">
<h2 id="tituloAula"></h2>
<div id="conteudoAula"></div>
<button id="btnConcluir"></button>
</div>
</section>

<nav>
<button onclick="show('aulas')">📚</button>
</nav>

<script>
let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;
let xpMax = +localStorage.getItem("xpMax") || 120;
let aulasFeitas = JSON.parse(localStorage.getItem("aulas")) || [];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function updateUI(){
document.getElementById("xp").innerText = xp;
document.getElementById("level").innerText = level;
document.getElementById("xpMax").innerText = xpMax;
bar.max = xpMax;
bar.value = xp;
}

function addXP(v){
xp += v;
if(xp >= xpMax){
xp = 0;
level++;
xpMax += 120;
alert("🎉 Subiu de nível!");
}
salvar();
updateUI();
}

const aulas = [
"Variáveis","Tipos de dados","Entrada de dados","Operadores","Condicionais",
"Laço for","Laço while","Listas","Tuplas","Dicionários",
"Funções","Módulos","Erros","Classes","Arquivos"
];

function renderAulas(){
let html="";
aulas.forEach((a,i)=>{
let desbloqueada = i===0 || aulasFeitas.includes(i-1);

html+=`
<div class="card ${!desbloqueada?"locked":""}">
<h3>${i+1}. ${a}</h3>
<button ${!desbloqueada?"disabled":""} onclick="abrirAula(${i})">Entrar na aula</button>
</div>`;
});
document.getElementById("aulas").innerHTML = html;
}

function abrirAula(i){
show("aulaView");
tituloAula.innerText = aulas[i];
conteudoAula.innerHTML = gerarConteudo(aulas[i]);

btnConcluir.innerText = aulasFeitas.includes(i) ? "Já concluída" : "Concluir aula (+5 XP)";
btnConcluir.disabled = aulasFeitas.includes(i);

btnConcluir.onclick = ()=>{
aulasFeitas.push(i);
addXP(5);
salvar();
renderAulas();
btnConcluir.innerText="✔ Concluída";
btnConcluir.disabled=true;
};
}

function gerarConteudo(titulo){

return `
<h3>📖 Introdução</h3>
<p>Esta aula aborda o conceito de <b>${titulo}</b> de forma completa e detalhada.</p>

<h3>🧠 Explicação</h3>
<p>Em programação, ${titulo.toLowerCase()} é um conceito essencial. Entender isso permite criar sistemas mais complexos e eficientes.</p>

<h3>💡 Exemplo 1</h3>
<pre>x = 10
print(x)</pre>

<h3>💡 Exemplo 2</h3>
<pre>nome = "João"
print("Olá", nome)</pre>

<h3>🧠 Exercício</h3>
<p>O que será exibido?</p>
<pre>y = 5
print(y + 5)</pre>

<h3>✅ Resolução</h3>
<p>Resultado: 10. Isso ocorre porque somamos 5 + 5.</p>

<h3>📚 Resumo</h3>
<p>Nesta aula você aprendeu sobre ${titulo.toLowerCase()} e como aplicar na prática.</p>
`;
}

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

renderAulas();
updateUI();
</script>

</body>
</html>
