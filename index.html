<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#0b1220;color:#e2e8f0;display:flex;}
#sidebar {width:260px;background:#020617;height:100vh;padding:15px;overflow:auto;}
.aulaBtn {width:100%;margin-bottom:10px;padding:12px;background:#1e293b;border:none;color:#cbd5f5;border-radius:8px;cursor:pointer;}
.locked {opacity:0.3;}
#main {flex:1;padding:25px;overflow:auto;height:100vh;}
header {background:#1e293b;padding:15px;border-radius:10px;margin-bottom:20px;}
.card {background:#1e293b;padding:25px;border-radius:12px;line-height:1.8;}
h2{color:#38bdf8;} h3{color:#7dd3fc;}
pre{background:#020617;padding:15px;border-radius:10px;color:#38bdf8;overflow:auto;}
textarea{width:100%;height:120px;background:#020617;color:white;border:1px solid #334155;border-radius:8px;padding:10px;}
button{margin-top:10px;padding:10px;background:#38bdf8;border:none;border-radius:8px;}
progress{width:100%;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
<header>
<h2>DevStudy Pro</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<div id="conteudo"></div>
</div>

<script>

let xp=+localStorage.getItem("xp")||0;
let level=+localStorage.getItem("level")||1;
let xpMax=+localStorage.getItem("xpMax")||120;
let aulasFeitas=JSON.parse(localStorage.getItem("aulas"))||[];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function updateUI(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
document.getElementById("xpMax").innerText=xpMax;
bar.max=xpMax;
bar.value=xp;
}

function addXP(v){
xp+=v;
if(xp>=xpMax){
xp=0;level++;xpMax+=120;
alert("🎉 Subiu de nível!");
}
if(xp<0)xp=0;
salvar();updateUI();
}

const aulas=["Variáveis","Tipos","Input","Operadores","Condicionais","For"];

function renderSidebar(){
let html="";
aulas.forEach((a,i)=>{
let ok=i===0||aulasFeitas.includes(i-1);
html+=`<button class="aulaBtn ${!ok?"locked":""}" ${!ok?"disabled":""} onclick="abrir(${i})">${i+1}. ${a}</button>`;
});
sidebar.innerHTML=html;
}

function abrir(i){
conteudo.innerHTML=conteudos[i];
let btn=document.getElementById("btnConcluir");

if(aulasFeitas.includes(i)){
btn.disabled=true;btn.innerText="✔ Concluída";
}else{
btn.innerText="Concluir aula (+5 XP)";
btn.onclick=()=>{concluir(i);btn.disabled=true;btn.innerText="✔ Concluída";}
}
}

function concluir(i){
if(aulasFeitas.includes(i))return;
aulasFeitas.push(i);
addXP(5);
salvar();
renderSidebar();
}

function corrigir(id,res){
let txt=document.getElementById(id).value.toLowerCase();
let r=document.getElementById(res);

if(txt.includes("=")){
r.innerHTML="✔ Boa resposta!";
addXP(10);
}else{
r.innerHTML="❌ Errado.<br><b>Exemplo:</b><pre>preco = 50\ndesconto = 10</pre>";
addXP(-3);
}
}

/* ================= CONTEÚDOS COMPLETOS ================= */
const conteudos = [

/* ================= AULA 1 PROFISSIONAL ================= */
`<div class="card">
<h2>📦 Variáveis — Fundamentos Profissionais da Programação</h2>

<h3>📖 Introdução Completa</h3>
<p>Variáveis são a base de toda a programação moderna. Elas representam espaços na memória do computador onde informações podem ser armazenadas, manipuladas e reutilizadas durante a execução de um programa.</p>

<p>Sem variáveis, não seria possível construir sistemas, realizar cálculos, armazenar dados de usuários ou criar qualquer tipo de lógica dinâmica.</p>

<p>Todo sistema que você usa hoje — redes sociais, jogos, aplicativos bancários — utiliza variáveis constantemente.</p>

---

<h3>🧠 Modelo Mental (Entendendo de Verdade)</h3>

<p>Pense em uma variável como uma caixa com um rótulo:</p>

<ul>
<li>O nome da variável → é o rótulo</li>
<li>O valor → é o conteúdo da caixa</li>
</ul>

<pre>
nome = "Carlos"
</pre>

<p>Aqui você criou:</p>
<ul>
<li>Uma variável chamada <b>nome</b></li>
<li>Que guarda o valor <b>"Carlos"</b></li>
</ul>

---

<h3>🧠 Como funciona internamente</h3>

<p>Quando você cria uma variável:</p>

<pre>
x = 10
</pre>

<p>O Python:</p>
<ul>
<li>Reserva espaço na memória RAM</li>
<li>Armazena o valor 10</li>
<li>Cria uma referência chamada "x"</li>
</ul>

<p>Isso permite acessar o valor sempre que necessário.</p>

---

<h3>💡 Exemplos progressivos</h3>

<h4>🔹 Exemplo 1 — básico</h4>
<pre>
idade = 20
print(idade)
</pre>

<h4>🔹 Exemplo 2 — soma</h4>
<pre>
a = 10
b = 5
resultado = a + b
print(resultado)
</pre>

<h4>🔹 Exemplo 3 — sistema de compra</h4>
<pre>
preco = 100
desconto = 20
total = preco - desconto

print("Total:", total)
</pre>

---

<h3>🌍 Aplicação real (nível sistema)</h3>

<p>Simulando um sistema de usuário:</p>

<pre>
nome = "João"
idade = 18
saldo = 500

print("Usuário:", nome)
print("Saldo:", saldo)
</pre>

<p>Esse tipo de lógica é usada em:</p>
<ul>
<li>Sistemas bancários</li>
<li>Jogos</li>
<li>Aplicativos</li>
</ul>

---

<h3>⚠️ Erros comuns (explicados profundamente)</h3>

<h4>❌ Erro 1 — esquecer aspas</h4>
<pre>
nome = Carlos
</pre>
<p>O Python tenta entender "Carlos" como variável → erro</p>

---

<h4>❌ Erro 2 — misturar tipos</h4>
<pre>
x = "10" + 5
</pre>
<p>Texto + número → erro de tipo</p>

---

<h4>❌ Erro 3 — nome inválido</h4>
<pre>
1nome = "Ana"
</pre>
<p>Variáveis não podem começar com número</p>

---

<h3>🧠 Boas práticas profissionais</h3>

<ul>
<li>Use nomes claros → preco, idade, saldo</li>
<li>Evite nomes genéricos → x, y</li>
<li>Use padrão consistente</li>
</ul>

---

<h3>🧠 Conceito avançado</h3>

<p>Python é dinamicamente tipado:</p>

<pre>
x = 10
x = "texto"
</pre>

<p>A mesma variável pode mudar de tipo.</p>

---

<h3>🧠 Exercício prático (nível real)</h3>

<p>Crie um sistema de compra com:</p>
<ul>
<li>produto</li>
<li>preco</li>
<li>quantidade</li>
<li>total</li>
</ul>

<textarea id="a1" placeholder="Digite seu código aqui..."></textarea>
<button onclick="corrigir('a1','r1')">Verificar resposta</button>
<p id="r1"></p>

---

<h3>📚 Desafio bônus (nível profissional)</h3>
<p>Simule um sistema de saldo bancário:</p>

<ul>
<li>saldo inicial</li>
<li>valor de saque</li>
<li>saldo final</li>
</ul>

---

<h3>📌 Resumo final</h3>

<p>Variáveis são essenciais para armazenar dados, criar lógica e desenvolver qualquer tipo de sistema. Dominar esse conceito é o primeiro passo para se tornar um programador profissional.</p>

<button id="btnConcluir"></button>
</div>`

/* ================= AULA 3 ================= */
`<div class="card">
<h2>⌨️ Input — Entrada de Dados Completa</h2>

<pre>

<button id="btnConcluir"></button>

];
  
renderSidebar();
updateUI();

</script>

</body>
</html>
