<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#0b1220;color:#e2e8f0;display:flex;}
#sidebar {width:260px;background:#020617;height:100vh;padding:15px;overflow:auto;}
.aulaBtn {width:100%;margin-bottom:10px;padding:12px;background:#1e293b;border:none;color:#cbd5f5;border-radius:8px;cursor:pointer;}
.locked {opacity:0.3;}
#main {flex:1;padding:25px;overflow:auto;height:100vh;}
header {background:#1e293b;padding:15px;border-radius:10px;margin-bottom:20px;}
.card {background:#1e293b;padding:25px;border-radius:12px;line-height:1.8;}
h2{color:#38bdf8;} h3{color:#7dd3fc;}
pre{background:#020617;padding:15px;border-radius:10px;color:#38bdf8;overflow:auto;}
textarea{width:100%;height:120px;background:#020617;color:white;border:1px solid #334155;border-radius:8px;padding:10px;}
button{margin-top:10px;padding:10px;background:#38bdf8;border:none;border-radius:8px;}
progress{width:100%;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
<header>
<h2>DevStudy Pro</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<div id="conteudo"></div>
</div>

<script>

let xp=+localStorage.getItem("xp")||0;
let level=+localStorage.getItem("level")||1;
let xpMax=+localStorage.getItem("xpMax")||120;
let aulasFeitas=JSON.parse(localStorage.getItem("aulas"))||[];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function updateUI(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
document.getElementById("xpMax").innerText=xpMax;
bar.max=xpMax;
bar.value=xp;
}

function addXP(v){
xp+=v;
if(xp>=xpMax){
xp=0;level++;xpMax+=120;
alert("🎉 Subiu de nível!");
}
if(xp<0)xp=0;
salvar();updateUI();
}

const aulas=["Variáveis","Tipos","Input","Operadores","Condicionais","For"];

function renderSidebar(){
let html="";
aulas.forEach((a,i)=>{
let ok=i===0||aulasFeitas.includes(i-1);
html+=`<button class="aulaBtn ${!ok?"locked":""}" ${!ok?"disabled":""} onclick="abrir(${i})">${i+1}. ${a}</button>`;
});
sidebar.innerHTML=html;
}

function abrir(i){
conteudo.innerHTML=conteudos[i];
let btn=document.getElementById("btnConcluir");

if(aulasFeitas.includes(i)){
btn.disabled=true;btn.innerText="✔ Concluída";
}else{
btn.innerText="Concluir aula (+5 XP)";
btn.onclick=()=>{concluir(i);btn.disabled=true;btn.innerText="✔ Concluída";}
}
}

function concluir(i){
if(aulasFeitas.includes(i))return;
aulasFeitas.push(i);
addXP(5);
salvar();
renderSidebar();
}

function corrigir(id,res){
let txt=document.getElementById(id).value.toLowerCase();
let r=document.getElementById(res);

if(txt.includes("=")){
r.innerHTML="✔ Boa resposta!";
addXP(10);
}else{
r.innerHTML="❌ Errado.<br><b>Exemplo:</b><pre>preco = 50\ndesconto = 10</pre>";
addXP(-3);
}
}

/* ================= CONTEÚDOS COMPLETOS ================= */
const conteudos = [

/* ================= AULA 1 ================= */
`<div class="card">
<h2>📦 Variáveis — Guia Profissional Completo</h2>

<h3>📖 Introdução profunda</h3>
<p>Variáveis são um dos pilares da programação. Elas permitem armazenar informações temporariamente na memória do computador, possibilitando manipulação de dados, cálculos, decisões e criação de sistemas reais.</p>

<p>Sem variáveis, não existe lógica computacional. Todo programa utiliza variáveis para funcionar.</p>

---

<h3>🧠 Como funciona na memória</h3>
<p>Quando você cria uma variável, o Python reserva um espaço na memória RAM e associa um nome a esse valor.</p>

<pre>
nome = "Carlos"
</pre>

<p>A variável "nome" agora aponta para o valor "Carlos".</p>

---

<h3>💡 Exemplos progressivos</h3>

<pre>
idade = 20
print(idade)
</pre>

<pre>
a = 10
b = 5
soma = a + b
print(soma)
</pre>

<pre>
produto = "Celular"
preco = 1500
quantidade = 2
total = preco * quantidade
print(total)
</pre>

---

<h3>🌍 Aplicação real</h3>
<pre>
cliente = "João"
saldo = 500
compra = 200
saldo_final = saldo - compra
</pre>

---

<h3>⚠️ Erros comuns</h3>

<pre>nome = Carlos</pre>
<p>Erro: falta aspas</p>

<pre>x = "10" + 5</pre>
<p>Erro: mistura de tipos</p>

<pre>1nome = "Ana"</pre>
<p>Erro: variável inválida</p>

---

<h3>🧠 Exercício</h3>
<p>Crie um sistema de compra com preco, desconto e total</p>

<textarea id="a1"></textarea>
<button onclick="corrigir('a1','r1')">Verificar</button>
<p id="r1"></p>

<button id="btnConcluir"></button>
</div>`,

/* ================= AULA 2 ================= */
`<div class="card">
<h2>🔢 Tipos de Dados — Guia Completo</h2>

<h3>📖 Conceito</h3>
<p>Tipos de dados definem como os valores são interpretados e manipulados pelo programa.</p>

---

<h3>🧠 Tipos principais</h3>
<ul>
<li>int → inteiro</li>
<li>float → decimal</li>
<li>str → texto</li>
<li>bool → verdadeiro/falso</li>
</ul>

---

<h3>💡 Exemplos</h3>

<pre>
idade = 25
preco = 19.90
nome = "Carlos"
ativo = True
</pre>

---

<h3>🧠 Tipagem dinâmica</h3>
<pre>
x = 10
x = "texto"
</pre>

---

<h3>⚠️ Erros comuns</h3>

<pre>"10" + 5</pre>
<p>Erro de tipo</p>

<pre>idade = "18"</pre>
<p>Virou string</p>

---

<h3>🧠 Conversão</h3>

<pre>
int("10")
float("5.5")
str(20)
</pre>

---

<h3>🧠 Exercício</h3>
<p>Crie um inteiro, um texto e um decimal</p>

<textarea id="a2"></textarea>
<button onclick="corrigir('a2','r2')">Verificar</button>
<p id="r2"></p>

<button id="btnConcluir"></button>
</div>`,

/* ================= AULA 3 ================= */
`<div class="card">
<h2>⌨️ Input — Entrada de Dados Completa</h2>

<h3>📖 Introdução</h3>
<p>O input() permite que o usuário interaja com o programa, tornando os sistemas dinâmicos.</p>

---

<h3>🧠 Funcionamento</h3>

<pre>
nome = input("Digite seu nome: ")
</pre>

<p>Sempre retorna texto.</p>

---

<h3>🧠 Conversão</h3>

<pre>
idade = int(input("Idade: "))
</pre>

---

<h3>💡 Exemplos reais</h3>

<pre>
n1 = int(input("Número 1: "))
n2 = int(input("Número 2: "))
print(n1 + n2)
</pre>

<pre>
preco = float(input("Preço: "))
quantidade = int(input("Qtd: "))
print(preco * quantidade)
</pre>

---

<h3>⚠️ Erros comuns</h3>

<pre>
n = input()
print(n + 10)
</pre>

<p>Erro: não converteu</p>

---

<h3>🧠 Exercício</h3>
<p>Peça nome e idade e mostre na tela</p>

<textarea id="a3"></textarea>
<button onclick="corrigir('a3','r3')">Verificar</button>
<p id="r3"></p>

<button id="btnConcluir"></button>
</div>`

];
  
renderSidebar();
updateUI();

</script>

</body>
</html>
