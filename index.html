<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro</title>

<style>
body {
margin:0;
font-family:'Segoe UI';
background:#0b1220;
color:#e2e8f0;
display:flex;
}

/* SIDEBAR */
#sidebar {
width:270px;
background:#020617;
height:100vh;
overflow:auto;
padding:15px;
}

.aulaBtn {
width:100%;
margin-bottom:10px;
padding:12px;
background:#1e293b;
border:none;
color:#cbd5f5;
border-radius:8px;
cursor:pointer;
text-align:left;
}

.locked {
opacity:0.3;
}

/* MAIN */
#main {
flex:1;
padding:25px;
overflow:auto;
height:100vh;
}

header {
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.card {
background:#1e293b;
padding:25px;
border-radius:12px;
line-height:1.9;
}

h2{color:#38bdf8;}
h3{color:#7dd3fc;}

pre {
background:#020617;
padding:15px;
border-radius:10px;
color:#38bdf8;
overflow:auto;
}

textarea {
width:100%;
height:120px;
background:#020617;
color:white;
border:1px solid #334155;
border-radius:8px;
padding:10px;
}

button {
margin-top:10px;
padding:10px;
background:#38bdf8;
border:none;
border-radius:8px;
}

progress {width:100%;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
<header>
<h2>DevStudy Pro</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<div id="conteudo"></div>
</div>

<script>

let xp=+localStorage.getItem("xp")||0;
let level=+localStorage.getItem("level")||1;
let xpMax=+localStorage.getItem("xpMax")||120;
let aulasFeitas=JSON.parse(localStorage.getItem("aulas"))||[];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function updateUI(){
xpEl.innerText=xp;
levelEl.innerText=level;
xpMaxEl.innerText=xpMax;
bar.max=xpMax;
bar.value=xp;
}

function addXP(v){
xp+=v;
if(xp>=xpMax){
xp=0;
level++;
xpMax+=120;
alert("🎉 Subiu de nível!");
}
if(xp<0)xp=0;
salvar();
updateUI();
}

const aulas=[
"Variáveis","Tipos","Input","Operadores","Condicionais",
"Loops","While","Listas","Tuplas","Dicionários",
"Funções","Funções Avançadas","Strings","Erros","Projeto Final"
];

function renderSidebar(){
let html="";
aulas.forEach((a,i)=>{
let ok=i===0||aulasFeitas.includes(i-1);
html+=`<button class="aulaBtn ${!ok?"locked":""}" ${!ok?"disabled":""} onclick="abrir(${i})">${i+1}. ${a}</button>`;
});
sidebar.innerHTML=html;
}

function abrir(i){
conteudo.innerHTML=conteudos[i];

let btn=document.getElementById("btnConcluir");

if(btn){
if(aulasFeitas.includes(i)){
btn.disabled=true;
btn.innerText="✔ Concluída";
}else{
btn.innerText="Concluir aula (+5 XP)";
btn.onclick=()=>{
aulasFeitas.push(i);
addXP(5);
salvar();
renderSidebar();
btn.disabled=true;
btn.innerText="✔ Concluída";
}
}
}
}

function corrigir(id,res){
let txt=document.getElementById(id).value.toLowerCase();
let r=document.getElementById(res);

if(txt.length>5){
r.innerHTML="✔ Boa resposta!";
addXP(10);
}else{
r.innerHTML="❌ Resposta fraca.<br><b>Exemplo:</b><pre>x = 10</pre>";
addXP(-3);
}
}

/* ================= AULAS 1–5 ================= */
const conteudos=[

/* ================= AULA 1 ================= */
`<div class="card">
<h2>📦 Variáveis — Fundamentos Completos</h2>

<p>Variáveis são estruturas que armazenam valores na memória. Elas permitem que você guarde informações e reutilize ao longo do programa.</p>

<h3>🧠 Como funciona</h3>
<p>Quando você escreve:</p>

<pre>
preco = 100
</pre>

<p>O Python cria um espaço na memória e associa o valor 100 ao nome "preco".</p>

<h3>💡 Exemplos</h3>

<pre>
nome = "Carlos"
idade = 20
</pre>

<pre>
a = 10
b = 5
resultado = a + b
</pre>

<h3>🌍 Exemplo real</h3>

<pre>
produto = "Celular"
preco = 1500
quantidade = 2
total = preco * quantidade
</pre>

<h3>⚠️ Erros comuns</h3>

<pre>
nome = Carlos
</pre>
<p>Erro: faltou aspas</p>

<pre>
1nome = "Ana"
</pre>
<p>Erro: não pode começar com número</p>

<h3>🧠 Boas práticas</h3>
<ul>
<li>Use nomes claros</li>
<li>Evite nomes genéricos</li>
<li>Padronize seu código</li>
</ul>

<textarea id="a1"></textarea>
<button onclick="corrigir('a1','r1')">Verificar</button>
<p id="r1"></p>

<button id="btnConcluir"></button>
</div>`,

/* ================= AULA 2 ================= */
`<div class="card">
<h2>🔢 Tipos de Dados — Explicação Completa</h2>

<p>Tipos de dados determinam como os valores são tratados pelo Python.</p>

<h3>📌 Tipos principais</h3>

<ul>
<li><b>int</b> → números inteiros</li>
<li><b>float</b> → números decimais</li>
<li><b>str</b> → textos</li>
<li><b>bool</b> → verdadeiro ou falso</li>
</ul>

<h3>💡 Exemplos</h3>

<pre>
idade = 20
preco = 19.90
nome = "Ana"
ativo = True
</pre>

<h3>🧠 Tipagem dinâmica</h3>

<pre>
x = 10
x = "texto"
</pre>

<p>Python permite mudar o tipo da variável.</p>

<h3>⚠️ Erros comuns</h3>

<pre>
"10" + 5
</pre>
<p>Erro: tipos diferentes</p>

<h3>🔄 Conversão</h3>

<pre>
int("10")
float("5.5")
str(20)
</pre>

<textarea id="a2"></textarea>
<button onclick="corrigir('a2','r2')">Verificar</button>
<p id="r2"></p>

<button id="btnConcluir"></button>
</div>`,

/* ================= AULA 3 ================= */
`<div class="card">
<h2>⌨️ Input — Entrada de Dados</h2>

<p>O input permite que o usuário envie dados para o programa.</p>

<h3>🧠 Funcionamento</h3>

<pre>
nome = input("Digite seu nome: ")
</pre>

<p>Sempre retorna texto.</p>

<h3>⚠️ Conversão</h3>

<pre>
idade = int(input("Idade: "))
</pre>

<h3>💡 Exemplos</h3>

<pre>
n1 = int(input("Número 1: "))
n2 = int(input("Número 2: "))
print(n1 + n2)
</pre>

<h3>🌍 Aplicação real</h3>

<pre>
nome = input("Nome: ")
idade = int(input("Idade: ")
print(nome, idade)
</pre>

<h3>⚠️ Erros comuns</h3>

<pre>
n = input()
print(n + 10)
</pre>

<p>Erro: não converteu</p>

<textarea id="a3"></textarea>
<button onclick="corrigir('a3','r3')">Verificar</button>
<p id="r3"></p>

<button id="btnConcluir"></button>
</div>`,

/* ================= AULA 4 ================= */
`<div class="card">
<h2>🧮 Operadores — Uso Completo</h2>

<h3>📌 Tipos</h3>

<ul>
<li>Aritméticos: + - * /</li>
<li>Comparação: > < == !=</li>
<li>Lógicos: and, or</li>
</ul>

<h3>💡 Exemplos</h3>

<pre>
a = 10
b = 5

print(a + b)
print(a > b)
</pre>

<h3>🌍 Exemplo real</h3>

<pre>
preco = 100
if preco > 50:
 print("Caro")
</pre>

<h3>⚠️ Erros</h3>

<pre>
if x = 10
</pre>

<p>Erro: usar ==</p>

<textarea id="a4"></textarea>
<button onclick="corrigir('a4','r4')">Verificar</button>
<p id="r4"></p>

<button id="btnConcluir"></button>
</div>`,

/* ================= AULA 5 ================= */
`<div class="card">
<h2>🧠 Condicionais — Controle de Fluxo</h2>

<p>Permitem tomar decisões dentro do programa.</p>

<h3>🧠 Estrutura</h3>

<pre>
if condição:
 ação
</pre>

<h3>💡 Exemplos</h3>

<pre>
idade = 18

if idade >= 18:
 print("Maior")
</pre>

<h3>🔄 if / else</h3>

<pre>
if idade >= 18:
 print("Maior")
else:
 print("Menor")
</pre>

<h3>🌍 Aplicação real</h3>

<pre>
senha = input("Senha:")

if senha == "123":
 print("Acesso liberado")
else:
 print("Acesso negado")
</pre>

<h3>⚠️ Erros</h3>

<pre>
if idade > 18
 print("ok")
</pre>

<p>Erro: falta :</p>

<textarea id="a5"></textarea>
<button onclick="corrigir('a5','r5')">Verificar</button>
<p id="r5"></p>

<button id="btnConcluir"></button>
</div>`
];

renderSidebar();
updateUI();

</script>

</body>
</html>
