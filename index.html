<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevStudy Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 15px;
    background: #1e293b;
    position: sticky;
    top: 0;
}

/* TELAS */
section {
    display: none;
    padding: 20px;
    min-height: calc(100vh - 120px);
}

section.active {
    display: block;
}

/* MENU */
nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    background: #020617;
}

nav button {
    flex: 1;
    padding: 12px;
    border: none;
    background: none;
    color: white;
}

/* CARDS */
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

/* BOTÕES */
button.action {
    margin-top: 10px;
    padding: 10px;
    background: #38bdf8;
    border: none;
    color: black;
    border-radius: 8px;
}

/* QUIZ */
.option {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #334155;
    border: none;
    color: white;
    border-radius: 8px;
}

/* PROGRESSO */
progress {
    width: 100%;
}
</style>
</head>

<body>

<header>
<h2>📱 DevStudy Pro</h2>
<p>XP: <span id="xp">0</span></p>
<progress id="bar" value="0" max="100"></progress>
</header>

<!-- INICIO -->
<section id="inicio" class="active">
<div class="card">
<h2>🏠 Bem-vindo</h2>
<p>Seu app profissional de estudos 🚀</p>
</div>
</section>

<!-- VARIAVEIS -->
<section id="variaveis">
<div class="card">
<h2>📦 Variáveis</h2>
<p>Guardam valores na memória.</p>

<code>
nome = "João"
idade = 20
</code>

<button class="action" onclick="addXP(10)">
Marcar como concluído (+10 XP)
</button>
</div>
</section>

<!-- LISTAS -->
<section id="listas">
<div class="card">
<h2>📋 Listas</h2>
<p>Guardam vários valores juntos.</p>

<code>
nomes = ["Ana", "João", "Carlos"]
</code>

<button class="action" onclick="addXP(10)">
Marcar como concluído (+10 XP)
</button>
</div>
</section>

<!-- QUIZ -->
<section id="quiz">
<div class="card">
<h2>🧠 Quiz</h2>
<p>O que é uma variável?</p>

<button class="option" onclick="responder(false)">Um site</button>
<button class="option" onclick="responder(true)">Um espaço que guarda dados</button>
<button class="option" onclick="responder(false)">Um celular</button>

<p id="result"></p>
</div>
</section>

<!-- MENU -->
<nav>
<button onclick="show('inicio')">🏠</button>
<button onclick="show('variaveis')">📦</button>
<button onclick="show('listas')">📋</button>
<button onclick="show('quiz')">🧠</button>
</nav>

<script>
let xp = localStorage.getItem("xp") || 0;

function updateUI() {
    document.getElementById("xp").innerText = xp;
    document.getElementById("bar").value = xp;
}

function addXP(value) {
    xp = parseInt(xp) + value;
    localStorage.setItem("xp", xp);
    updateUI();
    alert("Você ganhou " + value + " XP 🚀");
}

function responder(correto) {
    if (correto) {
        document.getElementById("result").innerText = "✔ Correto!";
        addXP(20);
    } else {
        document.getElementById("result").innerText = "❌ Tente novamente";
    }
}

function show(id) {
    document.querySelectorAll("section")
    .forEach(sec => sec.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

updateUI();
</script>

</body>
</html>
