<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;display:flex;}
#sidebar {width:260px;background:#020617;height:100vh;overflow:auto;padding:10px;}
.aulaBtn {display:block;width:100%;margin-bottom:8px;padding:10px;background:#1e293b;border:none;color:white;text-align:left;cursor:pointer;}
.locked {opacity:0.4;}
#main {flex:1;padding:20px;overflow:auto;height:100vh;}
header {background:#1e293b;padding:10px;margin-bottom:15px;}
.card {background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px;line-height:1.7;}
pre {background:#020617;padding:10px;border-radius:8px;}
textarea {width:100%;height:100px;background:#020617;color:white;border:none;padding:10px;}
button {margin-top:10px;padding:10px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;}
h3 {margin-top:20px;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
<header>
<h2>DevStudy Pro</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<div id="conteudo"></div>
</div>

<script>
let xp = +localStorage.getItem("xp")||0;
let level = +localStorage.getItem("level")||1;
let xpMax = +localStorage.getItem("xpMax")||120;
let aulasFeitas = JSON.parse(localStorage.getItem("aulas"))||[];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function updateUI(){
document.getElementById("xp").innerText = xp;
document.getElementById("level").innerText = level;
document.getElementById("xpMax").innerText = xpMax;
document.getElementById("bar").max = xpMax;
document.getElementById("bar").value = xp;
}

function addXP(v){
xp += v;
if(xp >= xpMax){
xp = 0;
level++;
xpMax += 120;
alert("🎉 Subiu de nível!");
}
if(xp < 0) xp = 0;
salvar();
updateUI();
}

const aulas = [
"Variáveis","Tipos de Dados","Entrada de Dados"
];

function renderSidebar(){
let html="";
aulas.forEach((a,i)=>{
let desbloqueada=i===0||aulasFeitas.includes(i-1);
html+=`<button class="aulaBtn ${!desbloqueada?"locked":""}"
${!desbloqueada?"disabled":""}
onclick="abrir(${i})">${i+1}. ${a}</button>`;
});
document.getElementById("sidebar").innerHTML=html;
}

function abrir(i){
document.getElementById("conteudo").innerHTML = conteudos[i];

let btn = document.getElementById("btnConcluir");

if(aulasFeitas.includes(i)){
btn.disabled = true;
btn.innerText = "✔ Aula concluída";
}else{
btn.onclick = function(){
concluir(i);
btn.disabled = true;
btn.innerText = "✔ Aula concluída";
};
}
}

function concluir(i){
if(aulasFeitas.includes(i)) return;
aulasFeitas.push(i);
addXP(5);
salvar();
renderSidebar();
}

function corrigir(id,res){
let txt=document.getElementById(id).value;
let r=document.getElementById(res);

if(txt.includes("=")){
r.innerHTML="✔ Boa! Você entendeu variável.";
addXP(10);
}else{
r.innerHTML="❌ Tente criar uma variável usando =";
addXP(-3);
}
}

const conteudos = [

`<div class="card">
<h2>📦 Variáveis (Aula Completa)</h2>

<h3>📖 Introdução</h3>
<p>Variáveis são a base da programação. Sempre que você quiser guardar uma informação — como nome, idade, preço — você usa uma variável.</p>

<p>Sem variáveis, você não consegue construir praticamente nenhum sistema.</p>

<h3>🧠 Como funciona</h3>
<p>Quando você cria uma variável, o Python guarda aquele valor na memória do computador.</p>

<pre>nome = "João"</pre>

<p>Aqui você criou uma variável chamada <b>nome</b> e guardou o valor "João".</p>

<h3>💡 Exemplo 1 (básico)</h3>
<pre>x = 10
print(x)</pre>

<h3>💡 Exemplo 2 (texto)</h3>
<pre>mensagem = "Olá mundo"
print(mensagem)</pre>

<h3>💡 Exemplo 3 (uso real)</h3>
<pre>preco = 100
desconto = 20
total = preco - desconto
print(total)</pre>

<h3>⚠️ Erros comuns</h3>

<p><b>Erro 1:</b></p>
<pre>nome = João</pre>
<p>Falta aspas → erro</p>

<p><b>Erro 2:</b></p>
<pre>x = "10" + 5</pre>
<p>Não pode somar texto com número</p>

<h3>🧠 Exercício</h3>
<p>Crie uma variável chamada idade e coloque valor 20</p>

<textarea id="ex1"></textarea>
<button onclick="corrigir('ex1','r1')">Verificar</button>
<p id="r1"></p>

<h3>📚 Resumo</h3>
<p>Você aprendeu que variáveis guardam dados e são essenciais na programação.</p>

<button id="btnConcluir">Concluir aula (+5 XP)</button>
</div>`,

`<div class="card"><h2>Tipos de Dados</h2><p>Aula simples por enquanto.</p><button id="btnConcluir">Concluir aula</button></div>`,

`<div class="card"><h2>Entrada de Dados</h2><p>Aula simples por enquanto.</p><button id="btnConcluir">Concluir aula</button></div>`

];

renderSidebar();
updateUI();
</script>

</body>
</html>
