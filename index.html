<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DevStudy Pro MAX</title>

<style>
body {
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */
#sidebar {
width:260px;
background:#020617;
height:100vh;
overflow:auto;
padding:10px;
}

.aulaBtn {
display:block;
width:100%;
margin-bottom:8px;
padding:10px;
background:#1e293b;
border:none;
color:white;
text-align:left;
}

.locked {opacity:0.4}

/* MAIN */
#main {
flex:1;
padding:20px;
overflow:auto;
height:100vh;
}

header {
background:#1e293b;
padding:10px;
margin-bottom:15px;
}

.card {
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
line-height:1.7;
}

pre {
background:#020617;
padding:10px;
border-radius:8px;
}

textarea {
width:100%;
height:100px;
background:#020617;
color:white;
border:none;
padding:10px;
}

button {
margin-top:10px;
padding:10px;
background:#38bdf8;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
<header>
<h2>DevStudy Pro MAX</h2>
<p>Nível <span id="level"></span> | XP <span id="xp"></span>/<span id="xpMax"></span></p>
<progress id="bar"></progress>
</header>

<div id="conteudo"></div>
</div>

<script>
let xp = +localStorage.getItem("xp")||0;
let level = +localStorage.getItem("level")||1;
let xpMax = +localStorage.getItem("xpMax")||120;
let aulasFeitas = JSON.parse(localStorage.getItem("aulas"))||[];

function salvar(){
localStorage.setItem("xp",xp);
localStorage.setItem("level",level);
localStorage.setItem("xpMax",xpMax);
localStorage.setItem("aulas",JSON.stringify(aulasFeitas));
}

function addXP(v){
xp+=v;
if(xp>=xpMax){
xp=0;
level++;
xpMax+=120;
alert("Subiu de nível!");
}
salvar();
updateUI();
}

function updateUI(){
xpEl.innerText=xp;
levelEl.innerText=level;
xpMaxEl.innerText=xpMax;
bar.max=xpMax;
bar.value=xp;
}

const aulas=[
"Variáveis","Tipos","Input","Operadores","If",
"For","While","Listas","Tuplas","Dicionários",
"Funções","Módulos","Erros","Classes","Arquivos"
];

function renderSidebar(){
let html="";
aulas.forEach((a,i)=>{
let desbloqueada=i===0||aulasFeitas.includes(i-1);
html+=`<button class="aulaBtn ${!desbloqueada?"locked":""}"
${!desbloqueada?"disabled":""}
onclick="abrir(${i})">${i+1}. ${a}</button>`;
});
sidebar.innerHTML=html;
}

function abrir(i){
conteudo.innerHTML=gerarAula(aulas[i],i);
}

function gerarAula(titulo,i){
return `
<div class="card">
<h2>${titulo}</h2>

<h3>Introdução completa</h3>
<p>${titulo} é um dos pilares da programação. Sem entender isso, você não consegue avançar para conceitos mais complexos. Aqui vamos explorar profundamente desde o básico até aplicações reais.</p>

<h3>Explicação detalhada</h3>
<p>Quando usamos ${titulo.toLowerCase()}, estamos lidando diretamente com a lógica do sistema. Isso influencia desde pequenas aplicações até sistemas grandes.</p>

<h3>Exemplo 1</h3>
<pre>x=10
print(x)</pre>

<h3>Exemplo 2</h3>
<pre>nome="Ana"
print(nome)</pre>

<h3>Exemplo prático real</h3>
<pre>idade=18
if idade>=18:
 print("Maior de idade")</pre>

<h3>Erro comum</h3>
<pre>x="10"+5</pre>
<p>Isso gera erro porque mistura tipos.</p>

<h3>Exercício</h3>
<p>Digite o código para somar dois números:</p>
<textarea id="code"></textarea>
<button onclick="corrigir(${i})">Verificar</button>

<p id="res"></p>

<button onclick="concluir(${i})">Concluir aula (+5 XP)</button>
</div>
`;
}

function corrigir(i){
let txt=document.getElementById("code").value;
let r=document.getElementById("res");

if(txt.includes("+")){
r.innerHTML="✔ Parece correto!";
addXP(10);
}else{
r.innerHTML="❌ Tente usar soma (+)";
addXP(-3);
}
}

function concluir(i){
if(aulasFeitas.includes(i))return;
aulasFeitas.push(i);
addXP(5);
salvar();
renderSidebar();
}

renderSidebar();
updateUI();
</script>

</body>
</html>
